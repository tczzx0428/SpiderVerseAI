<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpiderVerseAI - 灵感宇宙</title>
    <style>
      .prompt-markdown { font-size: 14px; line-height: 1.8; color: #333; }
      .prompt-markdown h1, .prompt-markdown h2, .prompt-markdown h3 { margin-top: 16px; margin-bottom: 8px; color: #1a1a1a; }
      .prompt-markdown h2 { font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
      .prompt-markdown h3 { font-size: 15px; }
      .prompt-markdown p { margin: 6px 0; }
      .prompt-markdown ul, .prompt-markdown ol { padding-left: 20px; margin: 6px 0; }
      .prompt-markdown li { margin: 4px 0; }
      .prompt-markdown code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #d63384; }
      .prompt-markdown pre { background: #f5f5f5; padding: 12px 16px; border-radius: 6px; overflow-x: auto; }
      .prompt-markdown pre code { background: none; padding: 0; color: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
