http:
  routers:
    # /api → FastAPI 后端
    backend:
      rule: "PathPrefix(`/api`)"
      service: backend-svc
      priority: 10

    # / → React 前端（兜底）
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend-svc
      priority: 1

  middlewares:
    sv-auth:
      forwardAuth:
        address: "http://backend:8000/api/auth/verify-app"
        authResponseHeaders:
          - "X-SV-User"
          - "X-SV-Role"
          - "X-SV-User-Id"

  services:
    backend-svc:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    frontend-svc:
      loadBalancer:
        servers:
          - url: "http://frontend:80"
